<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد البريد - AIForge</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
    <div class="auth-card">
        <h2>📧 تأكيد البريد الإلكتروني</h2>
        <p>أدخل الكود المرسل إلى بريدك الإلكتروني</p>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}
        <form method="POST">
            <input type="text" name="code" placeholder="الكود المكون من 6 أرقام" maxlength="6" required>
            <button type="submit" class="btn-primary">تأكيد</button>
        </form>
    </div>
</body>
</html>
